services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_USER: runbandits
      POSTGRES_PASSWORD: runbandits
      POSTGRES_DB: runbandits
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U runbandits"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5433:8000"

volumes:
  pgdata: